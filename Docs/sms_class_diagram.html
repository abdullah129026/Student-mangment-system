<style>
  :root {
    --bg: #0b0f1a; --surface: #111827; --surface2: #1a2236;
    --border: #1e3a5f; --accent: #00d4ff; --text: #e2e8f0; --muted: #64748b;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:var(--bg); color:var(--text); font-family:'Syne',sans-serif; min-height:100vh; padding:40px 20px; }
  body::before {
    content:''; position:fixed; inset:0;
    background-image: linear-gradient(rgba(0,212,255,0.03) 1px,transparent 1px), linear-gradient(90deg,rgba(0,212,255,0.03) 1px,transparent 1px);
    background-size:40px 40px; pointer-events:none; z-index:0;
  }
  .wrapper { position:relative; z-index:1; max-width:1520px; margin:0 auto; }
  header { text-align:center; margin-bottom:44px; }
  .tag { display:inline-block; font-family:'JetBrains Mono',monospace; font-size:11px; letter-spacing:3px; color:var(--accent); border:1px solid var(--accent); padding:4px 14px; border-radius:2px; margin-bottom:14px; }
  h1 { font-size:clamp(22px,4vw,44px); font-weight:800; background:linear-gradient(135deg,#fff 30%,var(--accent)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; }
  .subtitle { color:var(--muted); font-family:'JetBrains Mono',monospace; font-size:12px; margin-top:8px; }
  .section-label { font-family:'JetBrains Mono',monospace; font-size:11px; letter-spacing:3px; text-transform:uppercase; color:var(--muted); margin-bottom:18px; display:flex; align-items:center; gap:12px; }
  .section-label::after { content:''; flex:1; height:1px; background:var(--border); }
  .card { background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:28px; margin-bottom:40px; position:relative; overflow:hidden; }
  .card::before { content:''; position:absolute; top:0; left:0; right:0; height:2px; background:linear-gradient(90deg,var(--accent),#7c3aed); }
  .scroll { overflow-x:auto; padding-bottom:8px; }
  .legend { display:flex; flex-wrap:wrap; gap:18px; margin-top:24px; padding:14px 18px; background:var(--surface2); border-radius:8px; border:1px solid var(--border); font-family:'JetBrains Mono',monospace; font-size:12px; }
  .li { display:flex; align-items:center; gap:8px; }
  .dot { width:10px; height:10px; border-radius:50%; flex-shrink:0; }
</style>
</head>
